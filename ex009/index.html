<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem dinâmica</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
	<p>Tente abrir este site em vários dispositivos diferentes ou simplesmente
	aumente e diminua o tamanho do seu navegador.</p>
	<picture>
		<source media="(max-width: 750px)" srcset="imagens/img-pequena.png" type="image/png">
		<source media="(max-width: 1050px)" srcset="imagens/img-media.png" type="image/png">
		<img src="imagens/img-grande.png" alt="imagem flexivel">
	</picture>
</body>
</html>
